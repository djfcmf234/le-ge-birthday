<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>Happy Birthday, Le Ge! 🎂</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);font-family:"Segoe UI",system-ui,-apple-system,sans-serif;overflow-x:hidden;cursor:default;user-select:none;-webkit-tap-highlight-color:transparent}
canvas#confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.lang-toggle{position:fixed;top:12px;right:12px;z-index:200;width:48px;height:48px;border-radius:50%;border:2px solid rgba(255,255,255,.35);background:rgba(255,255,255,.1);backdrop-filter:blur(8px);color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center}
.lang-toggle:active{background:rgba(255,255,255,.2);transform:scale(1.08)}
.main-scroll{position:relative;z-index:10;width:100%;max-width:560px;max-height:100vh;max-height:100dvh;overflow-y:auto;padding:60px 16px 40px;display:flex;flex-direction:column;align-items:center;gap:20px;scrollbar-width:none;-ms-overflow-style:none}
.main-scroll::-webkit-scrollbar{display:none}
.card{background:rgba(255,255,255,.06);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.15);border-radius:24px;padding:32px 24px 24px;text-align:center;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.4);animation:fadeIn .8s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.card h1{font-size:clamp(22px,5.5vw,38px);background:linear-gradient(90deg,#ff6b6b,#feca57,#48dbfb,#ff9ff3);background-size:300% 300%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:gradientShift 3s ease infinite;margin-bottom:8px;line-height:1.2}
@keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.card .subtitle{color:rgba(255,255,255,.7);font-size:clamp(13px,2.8vw,16px);margin-bottom:16px;line-height:1.5}
.cake-wrap{position:relative;width:160px;height:180px;margin:0 auto 4px}
.cake-layer{position:absolute;left:50%;transform:translateX(-50%);border-radius:10px}
.cake-bottom{bottom:0;width:140px;height:54px;background:linear-gradient(180deg,#f8c291,#e55039);box-shadow:0 4px 10px rgba(0,0,0,.3)}
.cake-middle{bottom:44px;width:118px;height:42px;background:linear-gradient(180deg,#f6e58d,#f9ca24);box-shadow:0 4px 8px rgba(0,0,0,.25)}
.cake-top{bottom:80px;width:96px;height:30px;background:linear-gradient(180deg,#ffbe76,#f0932b);box-shadow:0 4px 6px rgba(0,0,0,.25)}
.cake-frosting{position:absolute;bottom:102px;left:50%;transform:translateX(-50%);width:104px;height:14px;border-radius:7px;background:linear-gradient(180deg,#fff,#ffeaa7)}
.cake-plate{position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:160px;height:10px;border-radius:5px;background:rgba(255,255,255,.18)}
.candles{position:absolute;bottom:110px;left:50%;transform:translateX(-50%);display:flex;gap:10px}
.candle{width:6px;height:28px;border-radius:3px 3px 2px 2px;position:relative}
.candle:nth-child(1){background:linear-gradient(180deg,#ff6b6b,#c0392b)}
.candle:nth-child(2){background:linear-gradient(180deg,#48dbfb,#0984e3)}
.candle:nth-child(3){background:linear-gradient(180deg,#feca57,#e17055)}
.candle:nth-child(4){background:linear-gradient(180deg,#a29bfe,#6c5ce7)}
.candle:nth-child(5){background:linear-gradient(180deg,#55efc4,#00b894)}
.flame{position:absolute;top:-14px;left:50%;transform:translateX(-50%);width:10px;height:16px;background:radial-gradient(ellipse at bottom,#ff9f43,#ff6b6b 60%,transparent 70%);border-radius:50% 50% 50% 50%/60% 60% 40% 40%;animation:flicker .6s ease-in-out infinite alternate;transition:opacity .4s,transform .4s}
.flame.out{opacity:0;transform:translateX(-50%) scale(0)}
@keyframes flicker{0%{transform:translateX(-50%) scaleY(1) rotate(-2deg)}100%{transform:translateX(-50%) scaleY(.7) rotate(2deg)}}
.cake-hint{color:rgba(255,255,255,.45);font-size:11px;margin-top:4px;transition:opacity .3s}
.games-title{color:rgba(255,255,255,.55);font-size:14px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-top:4px}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:10px;width:100%}
.game-card{background:rgba(255,255,255,.06);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:16px 10px 12px;text-align:center;cursor:pointer;transition:all .25s;color:#fff}
.game-card:active{transform:scale(.93);background:rgba(255,255,255,.14)}
.game-card .icon{font-size:clamp(26px,7vw,38px);display:block;margin-bottom:4px}
.game-card .name{font-size:11px;font-weight:600;opacity:.85;line-height:1.3}
.game-card .best{font-size:10px;opacity:.4;margin-top:2px}
.game-overlay{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.game-overlay.active{opacity:1;pointer-events:auto}
.game-header{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:10px 14px;color:#fff;z-index:5}
.game-back{background:rgba(255,255,255,.12);border:none;color:#fff;font-size:20px;width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.game-back:active{background:rgba(255,255,255,.25)}
.game-score{font-size:18px;font-weight:700}
.game-best{font-size:12px;opacity:.5}
.game-popup{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.7);z-index:10;opacity:0;pointer-events:none;transition:opacity .3s}
.game-popup.show{opacity:1;pointer-events:auto}
.game-popup-inner{background:rgba(30,30,50,.95);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:24px 20px;text-align:center;color:#fff;min-width:200px}
.game-popup-inner h2{font-size:22px;margin-bottom:6px}
.game-popup-inner p{font-size:14px;opacity:.7;margin-bottom:14px}
.game-popup-inner button{background:linear-gradient(135deg,#ff6b6b,#feca57);border:none;color:#111;font-size:15px;font-weight:700;padding:10px 24px;border-radius:22px;cursor:pointer}
.score-pop{position:fixed;pointer-events:none;z-index:160;font-size:22px;font-weight:900;color:#feca57;animation:scoreUp .8s ease-out forwards;text-shadow:0 0 8px rgba(254,202,87,.6)}
@keyframes scoreUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.5)}}
.combo-pop{position:fixed;pointer-events:none;z-index:160;font-size:16px;font-weight:700;color:#ff6b6b;animation:comboPop 1s ease-out forwards}
@keyframes comboPop{0%{opacity:1;transform:translateY(0) scale(.5)}50%{opacity:1;transform:translateY(-30px) scale(1.3)}100%{opacity:0;transform:translateY(-50px) scale(1)}}
.whack-board{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px;max-width:340px;width:100%}
.whack-hole{aspect-ratio:1;border-radius:50%;background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.12);position:relative;overflow:hidden;cursor:pointer}
.whack-hole:active{background:rgba(255,255,255,.1)}
.whack-mole{position:absolute;bottom:-60%;left:50%;transform:translateX(-50%);font-size:clamp(24px,8vw,38px);transition:bottom .1s ease-out;pointer-events:none}
.whack-mole.up{bottom:5%}
.whack-timer{color:#fff;font-size:26px;font-weight:700;margin-top:-6px}
.snake-canvas{border:2px solid rgba(255,255,255,.2);border-radius:12px;background:rgba(0,0,0,.4);max-width:340px;width:100%;aspect-ratio:1;touch-action:none}
.flappy-canvas{border:2px solid rgba(255,255,255,.2);border-radius:12px;background:linear-gradient(180deg,#4a90d9,#87ceeb);max-width:340px;width:100%;aspect-ratio:3/4;touch-action:none}
.flappy-hint{color:rgba(255,255,255,.45);font-size:12px;margin-top:4px}
.tt-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px;max-width:340px;width:100%;aspect-ratio:1;background:rgba(255,255,255,.06);border-radius:12px;touch-action:none}
.tt-cell{aspect-ratio:1;border-radius:8px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:clamp(14px,4vw,22px);color:#fff;transition:all .12s}
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px;max-width:340px;width:100%}
.mem-card{aspect-ratio:1;border-radius:10px;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.18);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:clamp(22px,6vw,34px);transition:transform .3s,background .2s}
.mem-card.flipped{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.4)}
.mem-card.matched{background:rgba(85,239,196,.2);border-color:rgba(85,239,196,.5);pointer-events:none}
.mem-card .face.hidden{opacity:0;position:absolute}
.react-area{width:100%;max-width:340px;aspect-ratio:1;border-radius:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;font-size:28px;font-weight:700;color:#fff}
.react-wait{background:rgba(255,50,50,.2);border:2px solid rgba(255,80,80,.4)}
.react-ready{background:rgba(80,200,80,.25);border:2px solid rgba(80,220,80,.5)}
.react-idle{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12)}
.react-result{color:#fff;font-size:16px;margin-top:6px;text-align:center;min-height:24px}
.simon-board{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:12px;max-width:320px;width:100%}
.simon-btn{aspect-ratio:1;border-radius:16px;border:3px solid rgba(255,255,255,.15);cursor:pointer;transition:filter .15s,transform .1s}
.simon-btn:active,.simon-btn.lit{filter:brightness(1.6);transform:scale(.95)}
.simon-btn:nth-child(1){background:#e74c3c}.simon-btn:nth-child(2){background:#2ecc71}
.simon-btn:nth-child(3){background:#3498db}.simon-btn:nth-child(4){background:#f39c12}
.simon-status{color:rgba(255,255,255,.6);font-size:14px;margin-top:4px;text-align:center;min-height:20px}
.simon-seq{color:rgba(255,255,255,.4);font-size:12px;margin-top:2px;text-align:center}
.rps-buttons{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.rps-btn{width:80px;height:80px;border-radius:50%;border:3px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);font-size:40px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.rps-btn:active{background:rgba(255,255,255,.2);transform:scale(.9)}
.rps-result{color:#fff;font-size:18px;font-weight:600;margin-top:14px;text-align:center;min-height:28px}
.rps-vs{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:10px}
.rps-choice{font-size:50px;min-width:60px;text-align:center}
.catch-canvas{border:2px solid rgba(255,255,255,.2);border-radius:12px;background:rgba(10,10,40,.6);max-width:340px;width:100%;aspect-ratio:3/4;touch-action:none}
.catch-btns{display:flex;gap:20px;margin-top:10px}
.catch-btn{width:60px;height:60px;border-radius:50%;border:2px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);color:#fff;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.catch-btn:active{background:rgba(255,255,255,.3)}
.ttt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:10px;max-width:300px;width:100%}
.ttt-cell{aspect-ratio:1;border-radius:12px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:clamp(32px,8vw,48px);transition:background .15s}
.ttt-cell:active{background:rgba(255,255,255,.14)}.ttt-cell.X{color:#ff6b6b}.ttt-cell.O{color:#48dbfb}
.ttt-turn{color:rgba(255,255,255,.5);font-size:14px;margin-top:8px;text-align:center;min-height:20px}
.dpad{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:grid;grid-template-columns:54px 54px 54px;grid-template-rows:54px 54px 54px;gap:3px}
.dpad-btn{width:54px;height:54px;border-radius:12px;border:2px solid rgba(255,255,255,.22);background:rgba(255,255,255,.06);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;touch-action:manipulation}
.dpad-btn:active{background:rgba(255,255,255,.28)}
.dpad-empty{background:transparent;border:none;pointer-events:none}
.sparkle{position:fixed;pointer-events:none;z-index:15;font-size:24px;animation:sparklePop .7s ease-out forwards}
@keyframes sparklePop{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}
.balloon{position:fixed;bottom:-120px;z-index:5;font-size:clamp(36px,8vw,56px);animation:floatUp linear infinite;pointer-events:none}
@keyframes floatUp{0%{transform:translateY(0) rotate(0deg);opacity:.9}80%{opacity:.7}100%{transform:translateY(-110vh) rotate(30deg);opacity:0}}
@media(min-width:420px){.dpad-btn{width:64px;height:64px;font-size:24px}.dpad{grid-template-columns:64px 64px 64px;grid-template-rows:64px 64px 64px}.games-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px}}
@media(max-width:340px){.dpad-btn{width:46px;height:46px;font-size:18px;border-radius:10px}.dpad{grid-template-columns:46px 46px 46px;grid-template-rows:46px 46px 46px;bottom:12px}}
</style>
</head>
<body>
<canvas id="confetti"></canvas>
<button class="lang-toggle" id="langBtn" title="Switch to Chinese">CN</button>
<div class="main-scroll" id="mainScroll">
<div class="card">
<h1 id="greeting">🎉 Happy Birthday, Le Ge! 🎉</h1>
<p class="subtitle" id="subtitle">Wishing my awesome cousin a day filled with joy, laughter, and everything that makes you smile. The world is brighter with you in it!</p>
<div class="cake-wrap"><div class="cake-plate"></div><div class="cake-bottom"></div><div class="cake-middle"></div><div class="cake-top"></div><div class="cake-frosting"></div>
<div class="candles" id="candles"><div class="candle"><div class="flame"></div></div><div class="candle"><div class="flame"></div></div><div class="candle"><div class="flame"></div></div><div class="candle"><div class="flame"></div></div><div class="candle"><div class="flame"></div></div></div></div>
<p class="cake-hint" id="cakeHint">🕯️ Tap the candles to blow them out — make a wish!</p></div>
<div class="games-title" id="gamesTitle">🎮 Mini Games</div>
<div class="games-grid" id="gamesGrid">
<div class="game-card" data-game="whack"><span class="icon">🔨</span><div class="name" id="gn_whack"></div><div class="best" id="gb_whack"></div></div>
<div class="game-card" data-game="snake"><span class="icon">🐍</span><div class="name" id="gn_snake"></div><div class="best" id="gb_snake"></div></div>
<div class="game-card" data-game="flappy"><span class="icon">🐦</span><div class="name" id="gn_flappy"></div><div class="best" id="gb_flappy"></div></div>
<div class="game-card" data-game="ttfe"><span class="icon">🧩</span><div class="name" id="gn_ttfe"></div><div class="best" id="gb_ttfe"></div></div>
<div class="game-card" data-game="memory"><span class="icon">🃏</span><div class="name" id="gn_memory"></div><div class="best" id="gb_memory"></div></div>
<div class="game-card" data-game="react"><span class="icon">⚡</span><div class="name" id="gn_react"></div><div class="best" id="gb_react"></div></div>
<div class="game-card" data-game="simon"><span class="icon">🎵</span><div class="name" id="gn_simon"></div><div class="best" id="gb_simon"></div></div>
<div class="game-card" data-game="rps"><span class="icon">✊</span><div class="name" id="gn_rps"></div><div class="best" id="gb_rps"></div></div>
<div class="game-card" data-game="catch"><span class="icon">⭐</span><div class="name" id="gn_catch"></div><div class="best" id="gb_catch"></div></div>
<div class="game-card" data-game="ttt"><span class="icon">❌</span><div class="name" id="gn_ttt"></div><div class="best" id="gb_ttt"></div></div>
</div></div>

<!-- ═══ GAME OVERLAYS ═══ -->
<div class="game-overlay" id="whackOverlay"><div class="game-header"><button class="game-back" data-close>✕</button><span class="game-score" id="whackScore">0</span><span class="game-best" id="whackBest"></span></div><div class="whack-timer" id="whackTimer">30</div><div class="whack-board" id="whackBoard"></div><div class="game-popup" id="whackPopup"><div class="game-popup-inner"><h2 id="whackPTitle"></h2><p id="whackPScore"></p><button id="whackReplay"></button></div></div></div>
<div class="game-overlay" id="snakeOverlay"><div class="game-header"><button class="game-back" data-close>✕</button><span class="game-score" id="snakeScore">0</span><span class="game-best" id="snakeBest"></span></div><canvas class="snake-canvas" id="snakeCanvas"></canvas><div class="dpad" id="snakeDpad"><div class="dpad-empty"></div><button class="dpad-btn" data-dir="up">▲</button><div class="dpad-empty"></div><button class="dpad-btn" data-dir="left">◀</button><div class="dpad-empty"></div><button class="dpad-btn" data-dir="right">▶</button><div class="dpad-empty"></div><button class="dpad-btn" data-dir="down">▼</button><div class="dpad-empty"></div></div><div class="game-popup" id="snakePopup"><div class="game-popup-inner"><h2 id="snakePTitle"></h2><p id="snakePScore"></p><button id="snakeReplay"></button></div></div></div>
<div class="game-overlay" id="flappyOverlay"><div class="game-header"><button class="game-back" data-close>✕</button><span class="game-score" id="flappyScore">0</span><span class="game-best" id="flappyBest"></span></div><canvas class="flappy-canvas" id="flappyCanvas"></canvas><p class="flappy-hint" id="flappyHint"></p><div class="game-popup" id="flappyPopup"><div class="game-popup-inner"><h2 id="flappyPTitle"></h2><p id="flappyPScore"></p><button id="flappyReplay"></button></div></div></div>
<div class="game-overlay" id="ttfeOverlay"><div class="game-header"><button class="game-back" data-close>✕</button><span class="game-score" id="ttfeScore">0</span><span class="game-best" id="ttfeBest"></span></div><div class="tt-grid" id="ttfeGrid"></div><div class="game-popup" id="ttfePopup"><div class="game-popup-inner"><h2 id="ttfePTitle"></h2><p id="ttfePScore"></p><button id="ttfeReplay"></button></div></div></div>
<div class="game-overlay" id="memoryOverlay"><div class="game-header"><button class="game-back" data-close>✕</button><span class="game-score" id="memoryScore">0</span><span class="game-best" id="memoryBest"></span></div><div class="mem-grid" id="memGrid"></div><div class="game-popup" id="memoryPopup"><div class="game-popup-inner"><h2 id="memoryPTitle"></h2><p id="memoryPScore"></p><button id="memoryReplay"></button></div></div></div>
<div class="game-overlay" id="reactOverlay"><div class="game-header"><button class="game-back" data-close>✕</button><span class="game-score" id="reactScore"></span><span class="game-best" id="reactBest"></span></div><div class="react-area react-idle" id="reactArea">Tap to start</div><div class="react-result" id="reactResult"></div><div class="game-popup" id="reactPopup"><div class="game-popup-inner"><h2 id="reactPTitle"></h2><p id="reactPScore"></p><button id="reactReplay"></button></div></div></div>
<div class="game-overlay" id="simonOverlay"><div class="game-header"><button class="game-back" data-close>✕</button><span class="game-score" id="simonScore">0</span><span class="game-best" id="simonBest"></span></div><div class="simon-board" id="simonBoard"><div class="simon-btn" data-idx="0"></div><div class="simon-btn" data-idx="1"></div><div class="simon-btn" data-idx="2"></div><div class="simon-btn" data-idx="3"></div></div><div class="simon-status" id="simonStatus"></div><div class="simon-seq" id="simonSeq"></div><div class="game-popup" id="simonPopup"><div class="game-popup-inner"><h2 id="simonPTitle"></h2><p id="simonPScore"></p><button id="simonReplay"></button></div></div></div>
<div class="game-overlay" id="rpsOverlay"><div class="game-header"><button class="game-back" data-close>✕</button><span class="game-score" id="rpsScore">0</span><span class="game-best" id="rpsBest"></span></div><div class="rps-vs"><span class="rps-choice" id="rpsYou"></span><span style="font-size:20px;opacity:.4">VS</span><span class="rps-choice" id="rpsBot"></span></div><div class="rps-result" id="rpsResult"></div><div class="rps-buttons"><button class="rps-btn" data-choice="0">✊</button><button class="rps-btn" data-choice="1">✋</button><button class="rps-btn" data-choice="2">✌️</button></div></div>
<div class="game-overlay" id="catchOverlay"><div class="game-header"><button class="game-back" data-close>✕</button><span class="game-score" id="catchScore">0</span><span class="game-best" id="catchBest"></span></div><canvas class="catch-canvas" id="catchCanvas"></canvas><div class="catch-btns"><button class="catch-btn" id="catchLeft">◀</button><button class="catch-btn" id="catchRight">▶</button></div><div class="game-popup" id="catchPopup"><div class="game-popup-inner"><h2 id="catchPTitle"></h2><p id="catchPScore"></p><button id="catchReplay"></button></div></div></div>

<script>
// ═══════════════ i18n ═══════════════
const i18n={en:{title:"🎉 Happy Birthday, Le Ge! 🎉",subtitle:"Wishing my awesome cousin a day filled with joy, laughter, and everything that makes you smile. The world is brighter with you in it!",hint:"🕯️ Tap the candles to blow them out — make a wish!",hintDone:"🎂 All candles blown out! Wish made! ✨",gamesTitle:"🎮 Mini Games",gn:{whack:"Whack-a-Mole",snake:"Snake",flappy:"Flappy Bird",ttfe:"2048",memory:"Memory Match",react:"Reaction Time",simon:"Simon Says",rps:"RPS",catch:"Star Catcher",ttt:"Tic-Tac-Toe"},best:n=>"Best: "+n,replay:"🔄 Play Again",flappyHint:"Tap to flap!",whackTitle:"Time's Up!",whackScore:n=>"You whacked "+n+" mole"+(n!==1?"s":"")+"!",snakeTitle:"Game Over!",snakeScore:n=>"Score: "+n,flappyTitle:"Game Over!",flappyScore:n=>"Score: "+n,ttfeTitle:"Game Over!",ttfeScore:n=>"Score: "+n,memoryTitle:"You Win!",memoryScore:n=>"Moves: "+n,reactIdle:"Tap to start",reactWait:"Wait...",reactTap:"TAP!",reactEarly:"Too early! Tap to retry",reactScore:n=>n+" ms",simonStatus:{watch:"Watch the pattern...",play:"Your turn!",wrong:"Wrong! Game Over"},rpsWin:"You win! 🎉",rpsLose:"Bot wins! 😢",rpsDraw:"Draw! 🤝",rpsPick:"Pick one!",catchTitle:"Game Over!",catchScore:n=>"Stars caught: "+n,tttTitle:{X:"You win! 🎉",O:"Bot wins! 😢",draw:"Draw! 🤝"},tttYourTurn:"Your turn (X)",tttBotTurn:"Bot thinking...",tttScore:(w,d,l)=>"W:"+w+" D:"+d+" L:"+l,simonScore:n=>"Level: "+n,rpsScore:(w,d,l)=>"W:"+w+" D:"+d+" L:"+l,reactBest:n=>n+"ms"},zh:{title:"🎉 乐哥，生日快乐！🎉",subtitle:"祝我超棒的表哥天天开心，笑口常开，万事如意！有你在的世界更精彩！",hint:"🕯️ 点击蜡烛吹灭它们 — 许个愿吧！",hintDone:"🎂 蜡烛全灭！愿望成真！✨",gamesTitle:"🎮 小游戏",gn:{whack:"打地鼠",snake:"贪吃蛇",flappy:"飞翔的小鸟",ttfe:"2048",memory:"记忆翻牌",react:"反应测试",simon:"西蒙说",rps:"猜拳",catch:"接星星",ttt:"井字棋"},best:n=>"最高: "+n,replay:"🔄 再来一次",flappyHint:"点击屏幕飞翔！",whackTitle:"时间到！",whackScore:n=>"你打中了 "+n+" 只地鼠！",snakeTitle:"游戏结束！",snakeScore:n=>"得分: "+n,flappyTitle:"游戏结束！",flappyScore:n=>"得分: "+n,ttfeTitle:"游戏结束！",ttfeScore:n=>"得分: "+n,memoryTitle:"你赢了！",memoryScore:n=>"步数: "+n,reactIdle:"点击开始",reactWait:"等待...",reactTap:"点！",reactEarly:"太早了！点击重试",reactScore:n=>n+" 毫秒",simonStatus:{watch:"记住顺序...",play:"轮到你了！",wrong:"错了！游戏结束"},rpsWin:"你赢了！🎉",rpsLose:"机器人赢了！😢",rpsDraw:"平局！🤝",rpsPick:"选一个！",catchTitle:"游戏结束！",catchScore:n=>"接到星星: "+n,tttTitle:{X:"你赢了！🎉",O:"机器人赢了！😢",draw:"平局！🤝"},tttYourTurn:"轮到你 (X)",tttBotTurn:"机器人思考中...",tttScore:(w,d,l)=>"胜:"+w+" 平:"+d+" 负:"+l,simonScore:n=>"第 "+n+" 关",rpsScore:(w,d,l)=>"胜:"+w+" 平:"+d+" 负:"+l,reactBest:n=>n+"毫秒"}};
let lang="en";
function t(key,...args){const v=i18n[lang][key];return typeof v==="function"?v(...args):(typeof v==="object"?v:v)}
function tn(path,...args){const keys=path.split(".");let v=i18n[lang];for(const k of keys)v=v[k];return typeof v==="function"?v(...args):v}
const $=id=>document.getElementById(id),Q=sel=>document.querySelectorAll(sel);
function syncLang(){document.documentElement.lang=lang==="zh"?"zh-CN":"en";$("greeting").textContent=t("title");$("subtitle").textContent=t("subtitle");$("langBtn").textContent=lang==="en"?"CN":"EN";$("langBtn").title=lang==="en"?"切换到中文":"Switch to English";$("gamesTitle").textContent=t("gamesTitle");const names=t("gn");for(const[k,v]of Object.entries(names)){const el=$("gn_"+k);if(el)el.textContent=v}if(candlesDone)$("cakeHint").textContent=t("hintDone");else $("cakeHint").textContent=t("hint");updateAllBests();if(activeGame==="flappy")$("flappyHint").textContent=t("flappyHint")}
$("langBtn").addEventListener("click",()=>{lang=lang==="en"?"zh":"en";syncLang()});

// ═══════════════ confetti ═══════════════
const cvs=$("confetti"),ctx=cvs.getContext("2d");let W,H;
function resize(){W=cvs.width=innerWidth;H=cvs.height=innerHeight}
resize();addEventListener("resize",resize);
const particles=[],colors=["#ff6b6b","#feca57","#48dbfb","#ff9ff3","#55efc4","#a29bfe","#fd79a8","#fdcb6e"];
function spawnBurst(x,y,count){for(let i=0;i<count;i++)particles.push({x:x||Math.random()*W,y:y||Math.random()*H*.5,vx:(Math.random()-.5)*6,vy:Math.random()*3+1,w:Math.random()*10+6,h:Math.random()*6+4,color:colors[Math.random()*colors.length|0],rot:Math.random()*360,rotV:(Math.random()-.5)*8,life:1,decay:Math.random()*.008+.004,gravity:.03})}
spawnBurst(W/2,H/2,80);setInterval(()=>spawnBurst(null,0,15),2000);
(function loop(){ctx.clearRect(0,0,W,H);for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.rot+=p.rotV;p.life-=p.decay;if(p.life<=0){particles.splice(i,1);continue}ctx.save();ctx.globalAlpha=p.life;ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore()}requestAnimationFrame(loop)})();

// ═══════════════ balloons ═══════════════
const bems=["🎈","🎈","🎈","🎊","🎉","🎀","🎁","✨"];
function spawnBalloon(){const e=document.createElement("div");e.className="balloon";e.textContent=bems[Math.random()*bems.length|0];e.style.left=Math.random()*90+"%";e.style.animationDuration=Math.random()*8+8+"s";document.body.appendChild(e);setTimeout(()=>e.remove(),17000)}
for(let i=0;i<5;i++)setTimeout(spawnBalloon,i*1200);setInterval(spawnBalloon,4000);

// ═══════════════ candles ═══════════════
let candlesDone=false;
function sparkleAt(x,y){const em=["✨","🌟","💫","⭐","🎉"];for(let i=0;i<8;i++){const s=document.createElement("div");s.className="sparkle";s.textContent=em[Math.random()*em.length|0];s.style.left=x+"px";s.style.top=y+"px";s.style.setProperty("--dx",(Math.random()-.5)*120+"px");s.style.setProperty("--dy",(Math.random()-.5)*120-40+"px");document.body.appendChild(s);setTimeout(()=>s.remove(),750)}}
let blown=0;
$("candles").addEventListener("click",e=>{const f=e.target.closest(".flame");if(!f||f.classList.contains("out"))return;f.classList.add("out");blown++;sparkleAt(e.clientX,e.clientY);if(blown===5){candlesDone=true;$("cakeHint").textContent=t("hintDone");spawnBurst(W/2,H/2,120)}});
document.addEventListener("click",e=>{if(!e.target.closest(".candle,#langBtn,.game-card,.game-overlay.active,.game-overlay.active *"))spawnBurst(e.clientX,e.clientY,14)});

// ═══════════════ best scores ═══════════════
function getBest(g){return parseInt(localStorage.getItem("bd_best_"+g)||"0")}
function setBest(g,v){localStorage.setItem("bd_best_"+g,v)}
const games=["whack","snake","flappy","ttfe","memory","react","simon","rps","catch","ttt"];
function updateAllBests(){for(const g of games){const el=$("gb_"+g);if(!el)continue;const v=getBest(g);if(g==="react")el.textContent=t("reactBest",v?v:"-");else if(g==="rps"){const d=JSON.parse(localStorage.getItem("bd_rps_stats")||'[0,0,0]');el.textContent=t("rpsScore",d[0],d[1],d[2])}else if(g==="ttt"){const d=JSON.parse(localStorage.getItem("bd_ttt_stats")||'[0,0,0]');el.textContent=t("tttScore",d[0],d[1],d[2])}else el.textContent=t("best",v||0)}}

// ═══════════════ overlay manager ═══════════════
let activeGame=null;
function openGame(game){activeGame=game;const fn=startFns[game];if(!fn)return;$("mainScroll").style.display="none";$(game+"Overlay").classList.add("active");if(game==="memory")$("memoryScore").textContent="0";fn()}
function closeGame(){if(!activeGame)return;const fn=stopFns[activeGame];if(fn)fn();$(activeGame+"Overlay").classList.remove("active");activeGame=null;$("mainScroll").style.display="";updateAllBests()}
Q(".game-card").forEach(c=>c.addEventListener("click",()=>openGame(c.dataset.game)));
Q(".game-back").forEach(b=>b.addEventListener("click",closeGame));
const startFns={},stopFns={};
function showPopup(game,titleKey,scoreFn,scoreVal){$(game+"PTitle").textContent=t(titleKey);$(game+"PScore").textContent=t(scoreFn,scoreVal);$(game+"Popup").classList.add("show")}
function bindReplay(game,startFn){$(game+"Replay").textContent=t("replay");$(game+"Replay").addEventListener("click",startFn)}

// ═══════════════ WHACK-A-MOLE ═══════════════
let whackIvl,whackTO,whackScoreN,whackTime,whackTIvl,whackRunning,whackCombo,whackComboTimer;
function scorePop(x,y,txt){const el=document.createElement("div");el.className="score-pop";el.textContent=txt;el.style.left=x+"px";el.style.top=y+"px";document.body.appendChild(el);setTimeout(()=>el.remove(),850)}
function comboPop(x,y,txt){const el=document.createElement("div");el.className="combo-pop";el.textContent=txt;el.style.left=x+"px";el.style.top=(y-20)+"px";document.body.appendChild(el);setTimeout(()=>el.remove(),1050)}
function startWhack(){whackScoreN=0;whackTime=30;whackCombo=0;whackRunning=true;$("whackScore").textContent="0";$("whackTimer").textContent="30";$("whackBest").textContent=t("best",getBest("whack"));$("whackPopup").classList.remove("show");const board=$("whackBoard");board.innerHTML="";for(let i=0;i<9;i++){const hole=document.createElement("div");hole.className="whack-hole";const mole=document.createElement("span");mole.className="whack-mole";mole.textContent="🐹";hole.appendChild(mole);hole.addEventListener("click",e=>{if(!mole.classList.contains("up")||!whackRunning)return;mole.classList.remove("up");clearTimeout(whackComboTimer);whackCombo++;whackComboTimer=setTimeout(()=>{whackCombo=0},800);const pts=whackCombo>=5?3:whackCombo>=3?2:1;whackScoreN+=pts;$("whackScore").textContent=whackScoreN;scorePop(e.clientX,e.clientY,"+"+pts);if(whackCombo>=3)comboPop(e.clientX,e.clientY,whackCombo+"x Combo!");sparkleAt(e.clientX,e.clientY)});board.appendChild(hole)}const moles=board.querySelectorAll(".whack-mole");function popUp(){if(!whackRunning)return;moles.forEach(m=>m.classList.remove("up"));const idx=Math.random()*9|0;moles[idx].classList.add("up");whackTO=setTimeout(()=>{moles[idx].classList.remove("up");if(whackRunning)whackIvl=setTimeout(popUp,Math.random()*400+350)},Math.random()*350+400)}whackIvl=setTimeout(popUp,300);whackTIvl=setInterval(()=>{whackTime--;$("whackTimer").textContent=whackTime;if(whackTime<=0)endWhack()},1000)}
function endWhack(){whackRunning=false;clearTimeout(whackIvl);clearTimeout(whackTO);clearInterval(whackTIvl);clearTimeout(whackComboTimer);const best=getBest("whack");if(whackScoreN>best)setBest("whack",whackScoreN);$("whackBest").textContent=t("best",getBest("whack"));showPopup("whack","whackTitle","whackScore",whackScoreN)}
function stopWhack(){whackRunning=false;clearTimeout(whackIvl);clearTimeout(whackTO);clearInterval(whackTIvl);clearTimeout(whackComboTimer)}
startFns.whack=startWhack;stopFns.whack=stopWhack;bindReplay("whack",startWhack);

// ═══════════════ SNAKE ═══════════════
const snakeCvs=$("snakeCanvas"),snakeCtx=snakeCvs.getContext("2d");let snake,snakeFood,snakeDir,snakeNextDir,snakeScoreN,snakeRunning,snakeLoop;const GRID=20;
function initSnake(){const cols=Math.floor(snakeCvs.width/GRID),rows=Math.floor(snakeCvs.height/GRID),cx=Math.floor(cols/2),cy=Math.floor(rows/2);snake=[{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];snakeDir={x:1,y:0};snakeNextDir={x:1,y:0};snakeScoreN=0;placeSnakeFood()}
function placeSnakeFood(){const cols=Math.floor(snakeCvs.width/GRID),rows=Math.floor(snakeCvs.height/GRID),occ=new Set(snake.map(s=>s.x+","+s.y));let fx,fy;do{fx=Math.random()*cols|0;fy=Math.random()*rows|0}while(occ.has(fx+","+fy));snakeFood={x:fx,y:fy}}
function drawSnake(){const cw=snakeCvs.width,ch=snakeCvs.height;snakeCtx.clearRect(0,0,cw,ch);snakeCtx.fillStyle="#ff6b6b";snakeCtx.beginPath();snakeCtx.arc(snakeFood.x*GRID+GRID/2,snakeFood.y*GRID+GRID/2,GRID/2-1,0,Math.PI*2);snakeCtx.fill();snake.forEach((s,i)=>{snakeCtx.fillStyle=i===0?"#55efc4":"#00b894";snakeCtx.fillRect(s.x*GRID+1,s.y*GRID+1,GRID-2,GRID-2)})}
function tickSnake(){if(!snakeRunning)return;snakeDir=snakeNextDir;const head={x:snake[0].x+snakeDir.x,y:snake[0].y+snakeDir.y},cols=Math.floor(snakeCvs.width/GRID),rows=Math.floor(snakeCvs.height/GRID);if(head.x<0||head.x>=cols||head.y<0||head.y>=rows){endSnake();return}if(snake.some(s=>s.x===head.x&&s.y===head.y)){endSnake();return}snake.unshift(head);if(head.x===snakeFood.x&&head.y===snakeFood.y){snakeScoreN++;$("snakeScore").textContent=snakeScoreN;placeSnakeFood()}else snake.pop();drawSnake();snakeLoop=setTimeout(tickSnake,120)}
function startSnake(){const size=Math.min(340,innerWidth-40);snakeCvs.width=size;snakeCvs.height=size;initSnake();snakeRunning=true;$("snakeScore").textContent="0";$("snakeBest").textContent=t("best",getBest("snake"));$("snakePopup").classList.remove("show");snakeDir={x:1,y:0};snakeNextDir={x:1,y:0};drawSnake();snakeLoop=setTimeout(tickSnake,300)}
function endSnake(){snakeRunning=false;clearTimeout(snakeLoop);const best=getBest("snake");if(snakeScoreN>best)setBest("snake",snakeScoreN);$("snakeBest").textContent=t("best",getBest("snake"));showPopup("snake","snakeTitle","snakeScore",snakeScoreN)}
function stopSnake(){snakeRunning=false;clearTimeout(snakeLoop)}
$("snakeDpad").addEventListener("click",e=>{const btn=e.target.closest(".dpad-btn");if(!btn||!snakeRunning)return;const dirs={up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}},nd=dirs[btn.dataset.dir];if(snakeDir.x+nd.x===0&&snakeDir.y+nd.y===0)return;snakeNextDir=nd});
document.addEventListener("keydown",e=>{if(activeGame!=="snake"||!snakeRunning)return;const map={ArrowUp:"up",ArrowDown:"down",ArrowLeft:"left",ArrowRight:"right",w:"up",s:"down",a:"left",d:"right"},d=map[e.key];if(!d)return;const dirs={up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}},nd=dirs[d];if(snakeDir.x+nd.x===0&&snakeDir.y+nd.y===0)return;snakeNextDir=nd;e.preventDefault()});
startFns.snake=startSnake;stopFns.snake=stopSnake;bindReplay("snake",startSnake);

// ═══════════════ FLAPPY BIRD ═══════════════
const flappyCvs=$("flappyCanvas"),flappyCtx=flappyCvs.getContext("2d");let bird,flappyPipes,flappyScoreN,flappyRunning,flappyLoop,flappyFrame;
function initFlappy(){bird={y:flappyCvs.height/2,vy:0};flappyPipes=[];flappyScoreN=0;flappyFrame=0}
function drawFlappy(){const cw=flappyCvs.width,ch=flappyCvs.height;flappyCtx.clearRect(0,0,cw,ch);flappyCtx.fillStyle="#8bc34a";flappyCtx.fillRect(0,ch-20,cw,20);flappyCtx.fillStyle="#689f38";flappyCtx.fillRect(0,ch-20,cw,4);flappyPipes.forEach(p=>{const gap=120;flappyCtx.fillStyle="#4caf50";flappyCtx.fillRect(p.x,0,50,p.gapY);flappyCtx.fillRect(p.x,p.gapY+gap,50,ch-20-p.gapY-gap);flappyCtx.fillStyle="#388e3c";flappyCtx.fillRect(p.x-4,p.gapY-24,58,24);flappyCtx.fillRect(p.x-4,p.gapY+gap,58,24)});const by=bird.y;flappyCtx.fillStyle="#fdd835";flappyCtx.beginPath();flappyCtx.arc(60,by,16,0,Math.PI*2);flappyCtx.fill();flappyCtx.fillStyle="#fff";flappyCtx.beginPath();flappyCtx.arc(66,by-4,6,0,Math.PI*2);flappyCtx.fill();flappyCtx.fillStyle="#111";flappyCtx.beginPath();flappyCtx.arc(68,by-5,2.5,0,Math.PI*2);flappyCtx.fill();flappyCtx.fillStyle="#ff6d00";flappyCtx.beginPath();flappyCtx.moveTo(76,by);flappyCtx.lineTo(72,by-4);flappyCtx.lineTo(72,by+4);flappyCtx.fill()}
function tickFlappy(){if(!flappyRunning)return;flappyFrame++;const cw=flappyCvs.width,ch=flappyCvs.height;bird.vy+=.55;bird.y+=bird.vy;if(flappyFrame%90===0){const gap=120;flappyPipes.push({x:cw,gapY:Math.random()*(ch-20-gap-60)+30})}flappyPipes.forEach(p=>p.x-=2.5);flappyPipes=flappyPipes.filter(p=>p.x>-60);flappyPipes.forEach(p=>{if(!p.scored&&p.x+25<60){p.scored=true;flappyScoreN++;$("flappyScore").textContent=flappyScoreN}});const by=bird.y;if(by<0||by>ch-20){endFlappy();return}for(const p of flappyPipes){const gap=120;if(60+16>p.x&&60-16<p.x+50&&(by-16<p.gapY||by+16>p.gapY+gap)){endFlappy();return}}drawFlappy();flappyLoop=requestAnimationFrame(tickFlappy)}
function startFlappy(){const w=Math.min(340,innerWidth-40);flappyCvs.width=w;flappyCvs.height=w*(4/3);initFlappy();flappyRunning=true;$("flappyScore").textContent="0";$("flappyHint").textContent=t("flappyHint");$("flappyBest").textContent=t("best",getBest("flappy"));$("flappyPopup").classList.remove("show");drawFlappy();flappyLoop=requestAnimationFrame(tickFlappy)}
function endFlappy(){flappyRunning=false;cancelAnimationFrame(flappyLoop);const best=getBest("flappy");if(flappyScoreN>best)setBest("flappy",flappyScoreN);$("flappyBest").textContent=t("best",getBest("flappy"));showPopup("flappy","flappyTitle","flappyScore",flappyScoreN)}
function stopFlappy(){flappyRunning=false;cancelAnimationFrame(flappyLoop)}
function flapFlappy(){if(!flappyRunning)return;bird.vy=-7}
flappyCvs.addEventListener("click",flapFlappy);flappyCvs.addEventListener("touchstart",e=>{e.preventDefault();flapFlappy()});
document.addEventListener("keydown",e=>{if(activeGame==="flappy"&&e.key===" "){e.preventDefault();flapFlappy()}});
startFns.flappy=startFlappy;stopFns.flappy=stopFlappy;bindReplay("flappy",startFlappy);

// ═══════════════ 2048 ═══════════════
let ttfeGrid,ttfeScoreN,ttfeRunning;
const ttfeColors={0:"rgba(255,255,255,.06)",2:"#eee4da",4:"#ede0c8",8:"#f2b179",16:"#f59563",32:"#f67c5f",64:"#f65e3b",128:"#edcf72",256:"#edcc61",512:"#edc850",1024:"#edc53f",2048:"#edc22e"};
function initTTFE(){ttfeGrid=Array.from({length:4},()=>Array(4).fill(0));ttfeScoreN=0;addTTFE();addTTFE();renderTTFE()}
function addTTFE(){const empty=[];for(let r=0;r<4;r++)for(let c=0;c<4;c++)if(!ttfeGrid[r][c])empty.push([r,c]);if(!empty.length)return;const[r,c]=empty[Math.random()*empty.length|0];ttfeGrid[r][c]=Math.random()<.9?2:4}
function renderTTFE(){const g=$("ttfeGrid");g.innerHTML="";$("ttfeScore").textContent=ttfeScoreN;for(let r=0;r<4;r++)for(let c=0;c<4;c++){const v=ttfeGrid[r][c],cell=document.createElement("div");cell.className="tt-cell";cell.textContent=v||"";cell.style.background=ttfeColors[v]||ttfeColors[0];cell.style.color=v>=8?"#fff":"#776e65";g.appendChild(cell)}}
function slideTTFE(row){let arr=row.filter(v=>v);for(let i=0;i<arr.length-1;i++){if(arr[i]===arr[i+1]){arr[i]*=2;ttfeScoreN+=arr[i];arr.splice(i+1,1)}}while(arr.length<4)arr.push(0);return arr}
function moveTTFE(dir){let moved=false;const rotate=grid=>{const n=Array.from({length:4},()=>Array(4).fill(0));for(let r=0;r<4;r++)for(let c=0;c<4;c++)n[r][c]=grid[3-c][r];return n};let g=ttfeGrid;if(dir==="up"){for(let i=0;i<3;i++)g=rotate(g)}else if(dir==="down"){g=rotate(g)}else if(dir==="right"){for(let i=0;i<2;i++)g=rotate(g)}for(let r=0;r<4;r++){const old=g[r].join(",");g[r]=slideTTFE(g[r]);if(g[r].join(",")!==old)moved=true}if(dir==="up"){for(let i=0;i<3;i++)g=rotate(g)}else if(dir==="down"){for(let i=0;i<3;i++)g=rotate(g)}else if(dir==="right"){for(let i=0;i<2;i++)g=rotate(g)}if(moved){ttfeGrid=g;addTTFE();renderTTFE();if(isTTFEGameOver())endTTFE()}}
function isTTFEGameOver(){for(let r=0;r<4;r++)for(let c=0;c<4;c++){if(!ttfeGrid[r][c])return false;if(c<3&&ttfeGrid[r][c]===ttfeGrid[r][c+1])return false;if(r<3&&ttfeGrid[r][c]===ttfeGrid[r+1][c])return false}return true}
function endTTFE(){ttfeRunning=false;const best=getBest("ttfe");if(ttfeScoreN>best)setBest("ttfe",ttfeScoreN);$("ttfeBest").textContent=t("best",getBest("ttfe"));showPopup("ttfe","ttfeTitle","ttfeScore",ttfeScoreN)}
let ttfeTouchStart;
function startTTFE(){initTTFE();ttfeRunning=true;$("ttfeBest").textContent=t("best",getBest("ttfe"));$("ttfePopup").classList.remove("show")}
$("ttfeGrid").addEventListener("touchstart",e=>{ttfeTouchStart={x:e.touches[0].clientX,y:e.touches[0].clientY}});
$("ttfeGrid").addEventListener("touchend",e=>{if(!ttfeRunning||!ttfeTouchStart)return;const dx=e.changedTouches[0].clientX-ttfeTouchStart.x,dy=e.changedTouches[0].clientY-ttfeTouchStart.y;if(Math.abs(dx)<20&&Math.abs(dy)<20)return;if(Math.abs(dx)>Math.abs(dy))moveTTFE(dx>0?"right":"left");else moveTTFE(dy>0?"down":"up")});
document.addEventListener("keydown",e=>{if(activeGame!=="ttfe"||!ttfeRunning)return;const map={ArrowUp:"up",ArrowDown:"down",ArrowLeft:"left",ArrowRight:"right"};if(map[e.key]){moveTTFE(map[e.key]);e.preventDefault()}});
startFns.ttfe=startTTFE;stopFns.ttfe=()=>{ttfeRunning=false};bindReplay("ttfe",startTTFE);

// ═══════════════ MEMORY MATCH ═══════════════
const memEmojis=["🍎","🍋","🍇","🍒","🌸","🌻","🌙","⭐"];let memCards,memFlipped,memLocked,memMoves,memMatched;
function startMemory(){const pairs=[...memEmojis,...memEmojis].sort(()=>Math.random()-.5);$("memGrid").innerHTML="";memFlipped=[];memLocked=false;memMoves=0;memMatched=0;$("memoryScore").textContent="0";$("memoryBest").textContent=t("best",getBest("memory"));$("memoryPopup").classList.remove("show");pairs.forEach((emoji,i)=>{const card=document.createElement("div");card.className="mem-card";card.dataset.idx=i;card.dataset.emoji=emoji;const face=document.createElement("span");face.className="face hidden";face.textContent=emoji;card.appendChild(face);card.appendChild(document.createTextNode("?"));card.addEventListener("click",()=>flipMem(card));$("memGrid").appendChild(card)});memCards=Q(".mem-card")}
function flipMem(card){if(memLocked||card.classList.contains("flipped")||card.classList.contains("matched"))return;card.classList.add("flipped");card.querySelector(".face").classList.remove("hidden");card.childNodes[1]&&(card.childNodes[1].textContent="");memFlipped.push(card);if(memFlipped.length===2){memMoves++;$("memoryScore").textContent=memMoves;memLocked=true;const[a,b]=memFlipped;if(a.dataset.emoji===b.dataset.emoji){a.classList.add("matched");b.classList.add("matched");memMatched++;memFlipped=[];memLocked=false;if(memMatched===memEmojis.length)endMemory()}else setTimeout(()=>{a.classList.remove("flipped");a.querySelector(".face").classList.add("hidden");a.appendChild(document.createTextNode("?"));b.classList.remove("flipped");b.querySelector(".face").classList.add("hidden");b.appendChild(document.createTextNode("?"));memFlipped=[];memLocked=false},600)}}
function endMemory(){const best=getBest("memory");if(!best||memMoves<best)setBest("memory",memMoves);$("memoryBest").textContent=t("best",getBest("memory"));showPopup("memory","memoryTitle","memoryScore",memMoves)}
startFns.memory=startMemory;stopFns.memory=()=>{};bindReplay("memory",startMemory);

// ═══════════════ REACTION TIME ═══════════════
let reactState,reactTimeout,reactStart,reactBestMs;
function startReaction(){reactBestMs=getBest("react")||null;$("reactScore").textContent="";$("reactBest").textContent=t("reactBest",reactBestMs||"-");$("reactPopup").classList.remove("show");resetReact()}
function resetReact(){reactState="idle";$("reactArea").textContent=t("reactIdle");$("reactArea").className="react-area react-idle";$("reactResult").textContent=""}
$("reactArea").addEventListener("click",()=>{if(reactState==="idle"){reactState="waiting";$("reactArea").textContent=t("reactWait");$("reactArea").className="react-area react-wait";reactTimeout=setTimeout(()=>{reactState="ready";$("reactArea").textContent=t("reactTap");$("reactArea").className="react-area react-ready";reactStart=performance.now()},Math.random()*2000+1000)}else if(reactState==="ready"){const ms=Math.round(performance.now()-reactStart);clearTimeout(reactTimeout);$("reactScore").textContent=t("reactScore",ms);$("reactResult").textContent=t("reactScore",ms);if(!reactBestMs||ms<reactBestMs){reactBestMs=ms;setBest("react",ms)}$("reactBest").textContent=t("reactBest",reactBestMs);$("reactArea").className="react-area react-idle";$("reactArea").textContent=t("reactIdle");reactState="idle"}else if(reactState==="waiting"){clearTimeout(reactTimeout);$("reactArea").textContent=t("reactEarly");$("reactArea").className="react-area react-wait";setTimeout(resetReact,800);reactState="early"}});
startFns.react=startReaction;stopFns.react=()=>{clearTimeout(reactTimeout)};

// ═══════════════ SIMON SAYS ═══════════════
let simonSeq,simonIdx,simonLevel,simonRunning,simonListening;
function startSimon(){simonSeq=[];simonLevel=0;simonRunning=true;simonListening=false;$("simonScore").textContent="0";$("simonBest").textContent=t("best",getBest("simon"));$("simonStatus").textContent="";$("simonSeq").textContent="";$("simonPopup").classList.remove("show");nextSimonLevel()}
function nextSimonLevel(){simonLevel++;simonListening=false;$("simonScore").textContent=t("simonScore",simonLevel);simonSeq.push(Math.random()*4|0);simonIdx=0;$("simonStatus").textContent=tn("simonStatus.watch");$("simonSeq").textContent="Level "+simonLevel;playSimonSeq(0)}
function playSimonSeq(i){if(i>=simonSeq.length){simonListening=true;simonIdx=0;$("simonStatus").textContent=tn("simonStatus.play");return}const btn=Q(".simon-btn")[simonSeq[i]];btn.classList.add("lit");setTimeout(()=>{btn.classList.remove("lit");setTimeout(()=>playSimonSeq(i+1),200)},400)}
Q(".simon-btn").forEach(btn=>{btn.addEventListener("click",()=>{if(!simonListening||!simonRunning)return;const idx=parseInt(btn.dataset.idx);btn.classList.add("lit");setTimeout(()=>btn.classList.remove("lit"),150);if(idx!==simonSeq[simonIdx]){endSimon();return}simonIdx++;if(simonIdx>=simonSeq.length){simonListening=false;setTimeout(nextSimonLevel,600)}})});
function endSimon(){simonRunning=false;simonListening=false;$("simonStatus").textContent=tn("simonStatus.wrong");const best=getBest("simon");if(simonLevel>best)setBest("simon",simonLevel);$("simonBest").textContent=t("best",getBest("simon"));showPopup("simon","snakeTitle","simonScore",simonLevel)}
startFns.simon=startSimon;stopFns.simon=()=>{simonRunning=false};bindReplay("simon",startSimon);

// ═══════════════ ROCK PAPER SCISSORS ═══════════════
let rpsStats=[0,0,0];
function loadRPS(){rpsStats=JSON.parse(localStorage.getItem("bd_rps_stats")||'[0,0,0]');updateRPSDisplay()}
function saveRPS(){localStorage.setItem("bd_rps_stats",JSON.stringify(rpsStats))}
function updateRPSDisplay(){$("rpsScore").textContent=t("rpsScore",rpsStats[0],rpsStats[1],rpsStats[2]);$("rpsBest").textContent=t("rpsScore",rpsStats[0],rpsStats[1],rpsStats[2])}
Q(".rps-btn").forEach(btn=>{btn.addEventListener("click",()=>{const you=parseInt(btn.dataset.choice),bot=Math.random()*3|0,emojis=["✊","✋","✌️"];$("rpsYou").textContent=emojis[you];$("rpsBot").textContent=emojis[bot];if(you===bot){rpsStats[1]++;$("rpsResult").textContent=t("rpsDraw")}else if((you===0&&bot===2)||(you===1&&bot===0)||(you===2&&bot===1)){rpsStats[0]++;$("rpsResult").textContent=t("rpsWin")}else{rpsStats[2]++;$("rpsResult").textContent=t("rpsLose")}saveRPS();updateRPSDisplay()})});
function startRPS(){loadRPS();$("rpsYou").textContent="❓";$("rpsBot").textContent="❓";$("rpsResult").textContent=t("rpsPick")}
startFns.rps=startRPS;stopFns.rps=()=>{};

// ═══════════════ CATCH STARS ═══════════════
const catchCvs=$("catchCanvas"),catchCtx=catchCvs.getContext("2d");let catchBasket,catchStars,catchScoreN,catchRunning,catchLoop,catchFrame;
function initCatch(){catchBasket={x:catchCvs.width/2-30,w:60};catchStars=[];catchScoreN=0;catchFrame=0}
function drawCatch(){const cw=catchCvs.width,ch=catchCvs.height;catchCtx.clearRect(0,0,cw,ch);catchCtx.fillStyle="#feca57";catchCtx.fillRect(catchBasket.x,ch-30,catchBasket.w,16);catchStars.forEach(s=>{catchCtx.fillStyle="#fff";catchCtx.font="24px sans-serif";catchCtx.fillText("⭐",s.x,s.y)})}
function tickCatch(){if(!catchRunning)return;catchFrame++;const cw=catchCvs.width,ch=catchCvs.height;if(catchFrame%40===0)catchStars.push({x:Math.random()*(cw-30),y:-20});for(let i=catchStars.length-1;i>=0;i--){catchStars[i].y+=2.5;if(catchStars[i].y>ch-30&&catchStars[i].y<ch-14&&catchStars[i].x>catchBasket.x-10&&catchStars[i].x<catchBasket.x+catchBasket.w+10){catchStars.splice(i,1);catchScoreN++;$("catchScore").textContent=catchScoreN;continue}if(catchStars[i].y>ch){catchStars.splice(i,1);endCatch();return}}drawCatch();catchLoop=requestAnimationFrame(tickCatch)}
function startCatch(){const w=Math.min(340,innerWidth-40);catchCvs.width=w;catchCvs.height=w*(4/3);initCatch();catchRunning=true;$("catchScore").textContent="0";$("catchBest").textContent=t("best",getBest("catch"));$("catchPopup").classList.remove("show");drawCatch();catchLoop=requestAnimationFrame(tickCatch)}
function endCatch(){catchRunning=false;cancelAnimationFrame(catchLoop);const best=getBest("catch");if(catchScoreN>best)setBest("catch",catchScoreN);$("catchBest").textContent=t("best",getBest("catch"));showPopup("catch","catchTitle","catchScore",catchScoreN)}
function stopCatch(){catchRunning=false;cancelAnimationFrame(catchLoop)}
let catchLeftHeld=false,catchRightHeld=false;
$("catchLeft").addEventListener("pointerdown",()=>{catchLeftHeld=true});$("catchLeft").addEventListener("pointerup",()=>{catchLeftHeld=false});$("catchLeft").addEventListener("pointerleave",()=>{catchLeftHeld=false});
$("catchRight").addEventListener("pointerdown",()=>{catchRightHeld=true});$("catchRight").addEventListener("pointerup",()=>{catchRightHeld=false});$("catchRight").addEventListener("pointerleave",()=>{catchRightHeld=false});
setInterval(()=>{if(catchRunning){if(catchLeftHeld)catchBasket.x=Math.max(0,catchBasket.x-5);if(catchRightHeld)catchBasket.x=Math.min(catchCvs.width-catchBasket.w,catchBasket.x+5)}},16);
startFns.catch=startCatch;stopFns.catch=stopCatch;bindReplay("catch",startCatch);

// ═══════════════ TIC-TAC-TOE ═══════════════
let tttBoard,tttRunning,tttStats=[0,0,0];
function loadTTT(){tttStats=JSON.parse(localStorage.getItem("bd_ttt_stats")||'[0,0,0]')}
function saveTTT(){localStorage.setItem("bd_ttt_stats",JSON.stringify(tttStats))}
function updateTTTDisplay(){$("tttScore").textContent=t("tttScore",tttStats[0],tttStats[1],tttStats[2]);$("tttBest").textContent=t("tttScore",tttStats[0],tttStats[1],tttStats[2])}
function checkTTTWin(board,player){const lines=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];return lines.some(l=>l.every(i=>board[i]===player))}
function placeTTT(i){if(!tttRunning||tttBoard[i]!=="")return;tttBoard[i]="X";const cell=Q(".ttt-cell")[i];cell.textContent="X";cell.className="ttt-cell X";if(checkTTTWin(tttBoard,"X")){tttStats[0]++;saveTTT();updateTTTDisplay();endTTT("X");return}if(tttBoard.every(v=>v!=="")){tttStats[1]++;saveTTT();updateTTTDisplay();endTTT("draw");return}$("tttTurn").textContent=tn("tttBotTurn");tttRunning=false;setTimeout(()=>{if(!activeGame||activeGame!=="ttt")return;const empty=tttBoard.map((v,i)=>v===""?i:-1).filter(i=>i!==-1);if(!empty.length)return;for(const p of["O","X"]){for(const i of empty){const b=[...tttBoard];b[i]=p;if(checkTTTWin(b,p)){tttBoard[i]="O";const c=Q(".ttt-cell")[i];c.textContent="O";c.className="ttt-cell O";if(checkTTTWin(tttBoard,"O")){tttStats[2]++;saveTTT();updateTTTDisplay();endTTT("O");return}if(tttBoard.every(v=>v!=="")){tttStats[1]++;saveTTT();updateTTTDisplay();endTTT("draw");return}tttRunning=true;$("tttTurn").textContent=tn("tttYourTurn");return}}}const ri=empty[Math.random()*empty.length|0];tttBoard[ri]="O";const c=Q(".ttt-cell")[ri];c.textContent="O";c.className="ttt-cell O";if(checkTTTWin(tttBoard,"O")){tttStats[2]++;saveTTT();updateTTTDisplay();endTTT("O");return}if(tttBoard.every(v=>v!=="")){tttStats[1]++;saveTTT();updateTTTDisplay();endTTT("draw");return}tttRunning=true;$("tttTurn").textContent=tn("tttYourTurn")},400+Math.random()*300)}
function endTTT(result){tttRunning=false;$("tttTurn").textContent="";showPopup("ttt","tttTitle",()=>tn("tttTitle."+result))}
function startTTT(){loadTTT();updateTTTDisplay();tttBoard=Array(9).fill("");tttRunning=true;$("tttGrid").innerHTML="";$("tttPopup").classList.remove("show");$("tttTurn").textContent=tn("tttYourTurn");for(let i=0;i<9;i++){const cell=document.createElement("div");cell.className="ttt-cell";cell.addEventListener("click",()=>placeTTT(i));$("tttGrid").appendChild(cell)}}
startFns.ttt=startTTT;stopFns.ttt=()=>{tttRunning=false};bindReplay("ttt",startTTT);

// ═══════════════ init ═══════════════
syncLang();
</script>
